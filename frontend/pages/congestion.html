function initMap() {
  var map = new BMap.Map('map');
  var ctr = new BMap.Point(114.06, 22.55);
  map.centerAndZoom(ctr, 12);
  map.enableScrollWheelZoom(true);
  map.addControl(new BMap.NavigationControl());
  map.addControl(new BMap.ScaleControl());

  for (var i = 0; i < roadSegments.length; i++) {
    var seg = roadSegments[i];
    var pts = seg.path.map(function(c) { return new BMap.Point(c[1], c[0]); });
    var poly = new BMap.Polyline(pts, {
      strokeColor: seg.color,
      strokeWeight: 3,
      strokeOpacity: 0.85
    });
    map.addOverlay(poly);
  }

  // GSAP: subtle map container fade-in
  if (typeof gsap === 'function') {
    gsap.fromTo('#map', { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: 'power2.out' });
  }
}
